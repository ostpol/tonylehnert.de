on: push
name: 🚀 Deploy website on push
jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
    
    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.6
      with:
        server: 188.68.47.87
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.ftp_password }}
        server-dir: /
        local-dir: /public
